# Server config
server.port=8080
# Application name
spring.application.name=My_Learning_Path

# =============================================
# Datasource config
# Đặt biến môi trường: DB_URL, DB_USERNAME, DB_PASSWORD
# Ví dụ (Windows PowerShell):
#   $env:DB_USERNAME="sa"; $env:DB_PASSWORD="yourPassword"
# =============================================
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=swp391_my_learning_path;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
logging.level.org.springframework.security=DEBUG

# JPA & Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
# Chạy lần đầu thì always, từ lần 2 trở đi thì never
#spring.sql.init.mode=always
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

#DEVTOOLS
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

#Thymeleaf
#spring.thymeleaf.prefix=classpath:/templates/
#spring.thymeleaf.suffix=.html
#spring.thymeleaf.cache=true

# File upload limit (CV: max 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB