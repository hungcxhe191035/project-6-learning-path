<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"

>
<head>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* ===== HERO BANNER ===== */
        .hero-section {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
            padding: 48px 0 40px;
            color: white;
        }
        .hero-greeting {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .hero-sub {
            font-size: 1rem;
            color: rgba(255,255,255,0.75);
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 8px;
        }
        .section-subtitle {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 24px;
        }

        /* ===== COURSE CARD ===== */
        .course-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            height: 100%;
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        /* Ảnh khoá học */
        .course-thumbnail {
            width: 100%;
            height: 175px;
            object-fit: cover;
            background: #e5e7eb;
        }
        .course-thumbnail-placeholder {
            width: 100%;
            height: 175px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
        }

        .course-body {
            padding: 14px 16px;
        }
        .course-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #111827;
            line-height: 1.4;
            margin-bottom: 4px;
            /* Giới hạn 2 dòng */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .course-instructor {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 6px;
        }

        /* Đánh giá sao */
        .star-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 6px;
        }
        .star-score {
            font-size: 0.85rem;
            font-weight: 700;
            color: #b45309;
        }
        .stars {
            color: #f59e0b;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .star-count {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        /* Giá tiền */
        .course-price {
            font-size: 1rem;
            font-weight: 700;
            color: #1e1b4b;
        }
        .course-price-old {
            font-size: 0.82rem;
            color: #9ca3af;
            text-decoration: line-through;
            margin-left: 6px;
        }

        /* Badge */
        .badge-bestseller {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div layout:fragment="content">

    <div class="container py-5">

        <h2 class="fw-bold mb-4">
            Danh sách khoá học
        </h2>

        <!-- Grid 5 khoá học: 5 cột trên desktop, 2 cột mobile -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-5 g-3">

            <!-- Lặp qua danh sách khoá học từ Controller -->
            <div class="col" th:each="course : ${courses}">
                <a th:href="@{/course/{id}(id=${course.courseId})}" style="text-decoration:none; display:block; height:100%;">
                <div class="course-card">

                    <!-- Ảnh khoá học -->
                    <img
                            th:if="${course.thumbnailUrl != null}"
                            th:src="${course.thumbnailUrl}"
                            th:alt="${course.title}"
                            class="course-thumbnail"
                    >
                    <!-- Placeholder nếu chưa có ảnh -->
                    <div
                            th:unless="${course.thumbnailUrl != null}"
                            class="course-thumbnail-placeholder"
                    >
                        <i class="bi bi-play-circle-fill"></i>
                    </div>

                    <div class="course-body">
                        <!-- Tên khoá học -->
                        <div class="course-title" th:text="${course.title}">
                            Tên khoá học
                        </div>

                        <!-- Tên giảng viên -->
                        <div class="course-instructor" th:text="${course.instructorName}">
                            Giảng viên
                        </div>

                        <!-- Đánh giá sao -->
                        <div class="star-rating">
                            <span class="star-score"
                                  th:text="${#numbers.formatDecimal(course.averageRating, 1, 1)}">4.5</span>
                            <span class="stars">
                                    <!-- 5 sao động theo averageRating -->
                                    <th:block th:with="rating=${course.averageRating.intValue()}">
                                        <i th:each="i : ${#numbers.sequence(1, 5)}"
                                           th:class="${i <= rating} ? 'bi bi-star-fill' : 'bi bi-star'">
                                        </i>
                                    </th:block>
                                </span>
                            <span class="star-count"
                                  th:text="'(' + ${#numbers.formatInteger(course.totalReviews, 1, 'COMMA')} + ')'">
                                    (1,234)
                                </span>
                        </div>

                        <!-- Giá tiền -->
                        <div>
                                <span class="course-price"
                                      th:text="${#numbers.formatInteger(course.price, 1, 'COMMA')} + ' ₫'">
                                    259.000 ₫
                                </span>
                        </div>

                        <!-- Nút hành động -->
                        <div class="d-flex justify-content-between align-items-center mt-3">

                            <div>
                                <span class="badge-bestseller" th:if="${!course.isEnrolled}">
                                    🔥 Bán chạy nhất
                                </span>
                            </div>

                            <div class="d-flex gap-2 w-100" th:if="${course.isEnrolled}">
                                <span th:href="@{/course/{id}(id=${course.courseId})}"
                                   class="btn btn-success w-100 fw-bold"
                                   style="position: relative; z-index: 10;">
                                    <i class="bi bi-play-circle me-1"></i> Vào học ngay
                                </span>
                            </div>

                            <div class="d-flex gap-2" th:unless="${course.isEnrolled}">

                                <!-- Add to cart -->
                                <button
                                        class="btn btn-outline-primary add-cart-btn"
                                        th:data-course-id="${course.courseId}"
                                        title="Thêm vào giỏ hàng"
                                        style="position: relative; z-index: 10;">

                                    <i class="bi bi-cart-plus"></i>

                                </button>

                                <!-- Save learning path -->
                                <button
                                        class="btn btn-outline-secondary save-course-btn"
                                        th:data-course-id="${course.courseId}"
                                        title="Lưu khóa học"
                                        style="position: relative; z-index: 10;">

                                    <i class="bi bi-bookmark"></i>

                                </button>

                            </div>

                        </div>
                    </div>
                </div>
                </a>
            </div>

        </div>
        <!-- END row -->
    </div>

    <!--modal learning path-->
    <div class="modal fade"
         id="learningPathModal"
         tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Lưu vào
                    </h5>

                    <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div id="learningPathContainer">

                    </div>
                    <hr>

                    <button
                            class="btn btn-outline-primary w-100"
                            id="showCreatePathForm">

                        <i class="bi bi-plus-lg"></i>
                        Tạo Learning Path mới

                    </button>
                    <!--                     form add learning path-->
                    <div
                            id="createPathSection"
                            class="mt-3 d-none">

                        <input
                                type="text"
                                id="newPathTitle"
                                class="form-control mb-2"
                                placeholder="Tên Learning Path">

                        <textarea
                                id="newPathDescription"
                                class="form-control mb-2"
                                rows="3"
                                placeholder="Mô tả (không bắt buộc)">
    </textarea>

                        <button
                                class="btn btn-primary w-100"
                                id="createPathBtn">

                            Tạo

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        let selectedCourseId = null;

        document.querySelectorAll(".save-course-btn")
        .forEach(button => {

            button.addEventListener(
                "click",
                async function(e) {
                    e.preventDefault();
                    e.stopPropagation();

                    selectedCourseId =
                        this.dataset.courseId;

                    const response =
                        await fetch(
                            `/api/learning-paths?courseId=${selectedCourseId}`
                        );

                    const paths =
                        await response.json();

                    let html = "";

                    paths.forEach(path => {

                        html += `
                            <div class="form-check mb-2">

                                <input
                                    class="form-check-input path-checkbox"
                                    type="checkbox"
                                    ${path.selected ? "checked" : ""}
                                    data-path-id="${path.pathId}">

                                <label
                                    class="form-check-label">

                                    ${path.title}

                                </label>

                            </div>
                        `;
                    });

                    document
                        .getElementById(
                            "learningPathContainer"
                        )
                        .innerHTML = html;

                    new bootstrap.Modal(
                        document.getElementById(
                            "learningPathModal"
                        )
                    ).show();

                }
            );

        });

        document.addEventListener(
    "change",
    async function(event) {

        if (
            !event.target.classList.contains(
                "path-checkbox"
            )
        ) {
            return;
        }

        const checkbox =
            event.target;

        const pathId =
            checkbox.dataset.pathId;

        try {

            if (checkbox.checked) {

                await fetch(
                    `/api/learning-paths/${pathId}/courses/${selectedCourseId}`,
                    {
                        method: "POST"
                    }
                );

                toastr.success(
                    "Đã thêm khóa học vào Learning Path"
                );

            } else {

                await fetch(
                    `/api/learning-paths/${pathId}/courses/${selectedCourseId}`,
                    {
                        method: "DELETE"
                    }
                );

                toastr.success(
                    "Đã xoá khóa học khỏi Learning Path"
                );

            }

        } catch (e) {

            toastr.error(
                "Có lỗi xảy ra"
            );

            checkbox.checked =
                !checkbox.checked;
        }
    }
);

<!--        add learning path-->
        document
    .getElementById(
        "showCreatePathForm"
    )
    .addEventListener(
        "click",
        function() {

            document
                .getElementById(
                    "createPathSection"
                )
                .classList
                .toggle("d-none");
        }
    );
        document
    .getElementById(
        "createPathBtn"
    )
    .addEventListener(
        "click",
        async function() {

            const title =
                document
                    .getElementById(
                        "newPathTitle"
                    )
                    .value
                    .trim();

            const description =
                document
                    .getElementById(
                        "newPathDescription"
                    )
                    .value
                    .trim();

            if (!title) {

                toastr.warning(
                    "Vui lòng nhập tên Learning Path"
                );

                return;
            }

            try {

                const response =
                    await fetch(
                        "/api/learning-paths",
                        {
                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body: JSON.stringify({
                                title,
                                description
                            })
                        }
                    );

                const path =
                    await response.json();

                const html =
                    `
                    <div class="form-check mb-2">

                        <input
                            checked
                            class="form-check-input path-checkbox"
                            type="checkbox"
                            data-path-id="${path.pathId}">

                        <label class="form-check-label">
                            ${path.title}
                        </label>

                    </div>
                    `;

                document
                    .getElementById(
                        "learningPathContainer"
                    )
                    .insertAdjacentHTML(
                        "beforeend",
                        html
                    );

                await fetch(
                    `/api/learning-paths/${path.pathId}/courses/${selectedCourseId}`,
                    {
                        method: "POST"
                    }
                );

                toastr.success(
                    "Đã tạo Learning Path"
                );

                document
                    .getElementById(
                        "newPathTitle"
                    )
                    .value = "";

                document
                    .getElementById(
                        "newPathDescription"
                    )
                    .value = "";

                document
                    .getElementById(
                        "createPathSection"
                    )
                    .classList
                    .add("d-none");

            } catch (e) {

                toastr.error(
                    "Không thể tạo Learning Path"
                );
            }
        }
    );

    document.querySelectorAll(".add-cart-btn")
        .forEach(btn => {

            btn.addEventListener(
                "click",
                async function(e) {
                    e.preventDefault();
                    e.stopPropagation();

                    const courseId =
                        this.dataset.courseId;

                    const response =
                        await fetch(
                            "/api/cart/" + courseId,
                            {
                                method: "POST"
                            }
                        );
                    if (
                        response.redirected &&
                        response.url.includes("/login")
                    ) {

                        window.location.href =
                            "/login";

                        return;
                    }
                    if(response.ok){

                        toastr.success(
                            "Đã thêm vào giỏ hàng"
                        );
                    }
                }
            );
        });
    </script>

</div>

</body>
</html>
