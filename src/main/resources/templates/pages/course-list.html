<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"

>
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<body>

<div layout:fragment="content">

    <div class="container py-5">

        <h2 class="fw-bold mb-4">
            Danh sách khoá học
        </h2>

        <div class="row g-4">

            <div
                    class="col-md-4"
                    th:each="course : ${courses}"
            >

                <div class="card h-100 shadow-sm">

                    <img
                            th:src="${course.currentPublishedVersion.thumbnail.fileUrl}"
                            class="card-img-top"
                            alt="course image"
                    >

                    <div class="card-body">

                        <h5
                                class="card-title"
                                th:text="${course.currentPublishedVersion.title}"
                        >
                            Course Title
                        </h5>

                        <p
                                class="card-text text-muted"
                                th:text="${course.currentPublishedVersion.description}"
                        >
                            Description
                        </p>

                        <div class="mb-2">

                            ⭐
                            <span
                                    th:text="${course.averageRating}"
                            >
                                5.0
                            </span>

                            (
                            <span
                                    th:text="${course.totalReviews}"
                            >
                                100
                            </span>
                            reviews
                            )

                        </div>

                        <div class="mb-2">

                            👨‍🎓
                            <span
                                    th:text="${course.totalStudents}"
                            >
                                500
                            </span>
                            students

                        </div>

                        <div class="fw-bold text-primary">

                            $
                            <span
                                    th:text="${course.currentPublishedVersion.price}"
                            >
                                49.99
                            </span>

                        </div>

                    </div>

                    <div class="card-footer bg-white">

                        <a
                                th:href="@{/courses/{id}(id=${course.courseId})}"
                                class="btn btn-primary w-100"
                        >
                            View Detail
                        </a>
                        <button
                                class="btn btn-outline-secondary save-course-btn"
                                th:data-course-id="${course.courseId}"
                        >
                            <i class="bi bi-bookmark"></i>
                        </button>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!--modal learning path-->
    <div class="modal fade"
         id="learningPathModal"
         tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Lưu vào
                    </h5>

                    <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div id="learningPathContainer">

                    </div>
                    <hr>

                    <button
                            class="btn btn-outline-primary w-100"
                            id="showCreatePathForm">

                        <i class="bi bi-plus-lg"></i>
                        Tạo Learning Path mới

                    </button>
<!--                     form add learning path-->
                    <div
                            id="createPathSection"
                            class="mt-3 d-none">

                        <input
                                type="text"
                                id="newPathTitle"
                                class="form-control mb-2"
                                placeholder="Tên Learning Path">

                        <textarea
                                id="newPathDescription"
                                class="form-control mb-2"
                                rows="3"
                                placeholder="Mô tả (không bắt buộc)">
    </textarea>

                        <button
                                class="btn btn-primary w-100"
                                id="createPathBtn">

                            Tạo

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        let selectedCourseId = null;

        document.querySelectorAll(".save-course-btn")
        .forEach(button => {

            button.addEventListener(
                "click",
                async function() {

                    selectedCourseId =
                        this.dataset.courseId;

                    const response =
                        await fetch(
                            `/api/learning-paths?courseId=${selectedCourseId}`
                        );

                    const paths =
                        await response.json();

                    let html = "";

                    paths.forEach(path => {

                        html += `
                            <div class="form-check mb-2">

                                <input
                                    class="form-check-input path-checkbox"
                                    type="checkbox"
                                    ${path.selected ? "checked" : ""}
                                    data-path-id="${path.pathId}">

                                <label
                                    class="form-check-label">

                                    ${path.title}

                                </label>

                            </div>
                        `;
                    });

                    document
                        .getElementById(
                            "learningPathContainer"
                        )
                        .innerHTML = html;

                    new bootstrap.Modal(
                        document.getElementById(
                            "learningPathModal"
                        )
                    ).show();

                }
            );

        });

        document.addEventListener(
    "change",
    async function(event) {

        if (
            !event.target.classList.contains(
                "path-checkbox"
            )
        ) {
            return;
        }

        const checkbox =
            event.target;

        const pathId =
            checkbox.dataset.pathId;

        try {

            if (checkbox.checked) {

                await fetch(
                    `/api/learning-paths/${pathId}/courses/${selectedCourseId}`,
                    {
                        method: "POST"
                    }
                );

                toastr.success(
                    "Đã thêm khóa học vào Learning Path"
                );

            } else {

                await fetch(
                    `/api/learning-paths/${pathId}/courses/${selectedCourseId}`,
                    {
                        method: "DELETE"
                    }
                );

                toastr.success(
                    "Đã xoá khóa học khỏi Learning Path"
                );

            }

        } catch (e) {

            toastr.error(
                "Có lỗi xảy ra"
            );

            checkbox.checked =
                !checkbox.checked;
        }
    }
);

<!--        add learning path-->
        document
    .getElementById(
        "showCreatePathForm"
    )
    .addEventListener(
        "click",
        function() {

            document
                .getElementById(
                    "createPathSection"
                )
                .classList
                .toggle("d-none");
        }
    );
        document
    .getElementById(
        "createPathBtn"
    )
    .addEventListener(
        "click",
        async function() {

            const title =
                document
                    .getElementById(
                        "newPathTitle"
                    )
                    .value
                    .trim();

            const description =
                document
                    .getElementById(
                        "newPathDescription"
                    )
                    .value
                    .trim();

            if (!title) {

                toastr.warning(
                    "Vui lòng nhập tên Learning Path"
                );

                return;
            }

            try {

                const response =
                    await fetch(
                        "/api/learning-paths",
                        {
                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body: JSON.stringify({
                                title,
                                description
                            })
                        }
                    );

                const path =
                    await response.json();

                const html =
                    `
                    <div class="form-check mb-2">

                        <input
                            checked
                            class="form-check-input path-checkbox"
                            type="checkbox"
                            data-path-id="${path.pathId}">

                        <label class="form-check-label">
                            ${path.title}
                        </label>

                    </div>
                    `;

                document
                    .getElementById(
                        "learningPathContainer"
                    )
                    .insertAdjacentHTML(
                        "beforeend",
                        html
                    );

                await fetch(
                    `/api/learning-paths/${path.pathId}/courses/${selectedCourseId}`,
                    {
                        method: "POST"
                    }
                );

                toastr.success(
                    "Đã tạo Learning Path"
                );

                document
                    .getElementById(
                        "newPathTitle"
                    )
                    .value = "";

                document
                    .getElementById(
                        "newPathDescription"
                    )
                    .value = "";

                document
                    .getElementById(
                        "createPathSection"
                    )
                    .classList
                    .add("d-none");

            } catch (e) {

                toastr.error(
                    "Không thể tạo Learning Path"
                );
            }
        }
    );
    </script>

</div>

</body>
</html>
