<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<head>
  <title>Làm bài trắc nghiệm</title>
  <style>
    :root {
      --primary: #7c3aed;
      --primary-light: #ede9fe;
      --primary-dark: #6d28d9;
      --success: #10b981;
      --danger: #ef4444;
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
    }

    .quiz-wrapper { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

    /* ===== BACK BUTTON ===== */
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--primary); text-decoration: none; font-size: 0.95rem;
      font-weight: 700; margin-bottom: 28px; padding: 10px 20px;
      border: 2px solid var(--primary-light); border-radius: 12px;
      background: white; transition: all 0.3s;
    }
    .btn-back:hover {
      background: var(--primary); color: white;
      border-color: var(--primary); transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124,58,237,0.25);
    }

    /* ===== HEADER ===== */
    .quiz-header {
      background: linear-gradient(135deg, #6d28d9, #7c3aed, #a78bfa);
      border-radius: 20px; padding: 40px; margin-bottom: 32px;
      color: white; text-align: center;
      box-shadow: 0 10px 30px rgba(124,58,237,0.3);
      position: relative; overflow: hidden;
    }
    .quiz-header::before {
      content: ''; position: absolute; top: -50%; right: -10%;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .quiz-header h3 { font-weight: 900; margin-bottom: 8px; font-size: 1.8rem; letter-spacing: -0.5px; }
    .quiz-header p { color: rgba(255,255,255,0.8); margin: 0; font-size: 1rem; }
    .quiz-header .header-icon { font-size: 3rem; margin-bottom: 16px; display: block; }

    /* ===== PROGRESS DOTS ===== */
    .quiz-progress { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
    .progress-label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-right: 8px; }
    .q-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--border-color); cursor: pointer;
      transition: all 0.2s; border: 2px solid transparent;
    }
    .q-dot:hover { transform: scale(1.3); border-color: var(--primary); }
    .q-dot.answered { background: var(--primary); }
    .q-dot.correct { background: var(--success); }
    .q-dot.wrong { background: var(--danger); }

    /* ===== QUESTION CARD ===== */
    .question-card {
      background: var(--bg-card); border-radius: 16px; padding: 28px;
      margin-bottom: 20px; border: 2px solid var(--border-color);
      transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    .question-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
    .question-card.answered { border-color: var(--primary-light); background: #faf8ff; }

    .question-num {
      font-size: 0.8rem; color: var(--primary); font-weight: 800;
      margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
      display: flex; align-items: center; gap: 8px;
    }
    .question-num::before {
      content: ''; display: inline-block; width: 4px; height: 16px;
      background: var(--primary); border-radius: 2px;
    }
    .question-text {
      font-size: 1.1rem; font-weight: 700; color: var(--text-main);
      margin-bottom: 20px; line-height: 1.6;
    }

    /* ===== ANSWER OPTIONS ===== */
    .answer-option {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px; border-radius: 12px; cursor: pointer;
      border: 2px solid var(--border-color); margin-bottom: 12px;
      transition: all 0.2s; color: var(--text-main); background: var(--bg-card);
      font-weight: 500;
    }
    .answer-option:hover {
      border-color: var(--primary); color: var(--primary-dark);
      background: var(--primary-light); transform: translateX(4px);
    }
    .answer-option input[type="radio"] { accent-color: var(--primary); width: 18px; height: 18px; flex-shrink: 0; }
    .answer-option.correct {
      border-color: var(--success); background: #d1fae5;
      color: #065f46; font-weight: 700;
    }
    .answer-option.wrong {
      border-color: var(--danger); background: #fee2e2;
      color: #991b1b; font-weight: 700;
    }
    .answer-option.show-correct { border-color: var(--success); background: #f0fdf4; }

    /* ===== SUBMIT BUTTON ===== */
    .btn-submit-wrap { text-align: center; margin-top: 36px; }
    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; color: white; padding: 16px 48px; border-radius: 14px;
      font-weight: 800; font-size: 1.1rem; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 8px 20px rgba(124,58,237,0.3);
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(124,58,237,0.4);
    }

    /* ===== RESULT CARD ===== */
    .result-card {
      background: var(--bg-card); border-radius: 24px; padding: 48px;
      text-align: center; border: 1px solid var(--border-color);
      box-shadow: 0 20px 50px rgba(0,0,0,0.06); margin-bottom: 32px;
    }
    .result-score { font-size: 5rem; font-weight: 900; line-height: 1; }
    .result-score.pass { color: var(--success); }
    .result-score.fail { color: var(--danger); }
    .result-label { font-size: 1.1rem; margin-top: 10px; color: var(--text-muted); font-weight: 600; }
    .result-badge {
      display: inline-block; padding: 12px 28px; border-radius: 99px;
      font-weight: 800; font-size: 1rem; margin-top: 20px; margin-bottom: 32px;
    }
    .badge-pass {
      background: #d1fae5; color: #065f46;
      border: 2px solid var(--success);
      box-shadow: 0 4px 15px rgba(16,185,129,0.2);
    }
    .badge-fail {
      background: #fee2e2; color: #991b1b;
      border: 2px solid var(--danger);
      box-shadow: 0 4px 15px rgba(239,68,68,0.2);
    }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ===== LOADING ===== */
    .loading-area {
      text-align: center; padding: 80px 40px;
      background: var(--bg-card); border-radius: 20px;
      border: 1px solid var(--border-color);
    }
    .loading-area .spinner-border { width: 3rem; height: 3rem; color: var(--primary); }

    /* ===== RESULT DETAIL TITLE ===== */
    .detail-title {
      font-weight: 800; font-size: 1.2rem; color: var(--text-main);
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .detail-title::before {
      content: ''; display: inline-block; width: 5px; height: 22px;
      background: var(--primary); border-radius: 3px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; border: 3px solid var(--bg-main); }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>

<body>
<div layout:fragment="content" style="background: var(--bg-main); min-height: 100vh; padding: 32px 20px;">

  <div class="quiz-wrapper">

    <!-- Back - Luôn cho phép quay lại, không chặn người dùng -->
    <a th:href="@{/learn/{id}(id=${courseId})}" class="btn-back">
      <i class="bi bi-arrow-left"></i> Quay lại khoá học
    </a>

    <!-- Header -->
    <div class="quiz-header">
      <span class="header-icon">📝</span>
      <h3>Bài Trắc Nghiệm</h3>
      <p>Trả lời đúng ≥ 80% để hoàn thành bài học và mở khoá bài tiếp theo</p>
    </div>

    <!-- Loading -->
    <div id="loadingArea" class="loading-area">
      <div class="spinner-border" role="status"></div>
      <p class="mt-3" style="color: var(--text-muted); font-weight: 600;">Đang tải câu hỏi...</p>
    </div>

    <!-- Quiz Form -->
    <div id="quizArea" style="display:none;">
      <div class="quiz-progress" id="progressDots">
        <span class="progress-label">Câu hỏi:</span>
      </div>
      <div id="questionList"></div>
      <div class="btn-submit-wrap">
        <button class="btn-submit" onclick="submitQuiz()">
          <i class="bi bi-send-check-fill me-2"></i>Nộp bài
        </button>
      </div>
    </div>

    <!-- Result -->
    <div id="resultArea" style="display:none;"></div>

  </div>

  <script th:inline="javascript">
    const COURSE_ID = /*[[${courseId}]]*/ 0;
    const LESSON_ID = /*[[${lessonId}]]*/ 0;
    let quizData = [];

    // Load câu hỏi
    fetch(`/api/learn/${COURSE_ID}/quiz/${LESSON_ID}`)
            .then(r => r.json())
            .then(data => {
              quizData = data;
              document.getElementById('loadingArea').style.display = 'none';
              document.getElementById('quizArea').style.display = 'block';
              renderQuiz(data);
            })
            .catch(() => {
              document.getElementById('loadingArea').innerHTML =
                      '<p style="color:#ef4444; font-weight:700;">Không thể tải câu hỏi. Vui lòng thử lại.</p>';
            });

    function renderQuiz(questions) {
      // Dots
      const dots = document.getElementById('progressDots');
      const dotsHtml = questions.map((_, i) =>
              `<div class="q-dot" id="dot-${i}" title="Câu ${i+1}" onclick="scrollToQ(${i})"></div>`
      ).join('');
      dots.innerHTML = '<span class="progress-label">Câu hỏi:</span>' + dotsHtml;

      // Questions
      const list = document.getElementById('questionList');
      list.innerHTML = questions.map((q, i) => `
        <div class="question-card" id="qcard-${i}">
          <div class="question-num">Câu ${i + 1} / ${questions.length}</div>
          <div class="question-text">${q.questionText}</div>
          ${q.answers.map(a => `
            <label class="answer-option" id="opt-${q.questionId}-${a.answerId}">
              <input type="radio" name="q${q.questionId}" value="${a.answerId}"
                     onchange="onAnswered(${i}, ${q.questionId})">
              <span>${a.answerText}</span>
            </label>`).join('')}
        </div>`).join('');
    }

    function onAnswered(qIndex, questionId) {
      document.getElementById('qcard-' + qIndex).classList.add('answered');
      document.getElementById('dot-' + qIndex).classList.add('answered');
    }

    function scrollToQ(index) {
      document.getElementById('qcard-' + index).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function submitQuiz() {
      const answers = {};
      let allAnswered = true;
      quizData.forEach(q => {
        const sel = document.querySelector(`input[name="q${q.questionId}"]:checked`);
        if (sel) {
          answers[q.questionId] = parseInt(sel.value);
        } else {
          allAnswered = false;
        }
      });

      if (!allAnswered) {
        if (!confirm('Bạn chưa trả lời hết tất cả câu hỏi. Vẫn muốn nộp bài?')) return;
      }

      fetch(`/api/learn/${COURSE_ID}/quiz/${LESSON_ID}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(answers)
      })
              .then(r => r.json())
              .then(result => showResult(result));
    }

    function showResult(result) {
      document.getElementById('quizArea').style.display = 'none';

      const passed = result.passed;
      const score = result.scorePercent;

      const detailHtml = result.questionResults.map((qr, i) => {
        const aList = qr.answers.map(function(a) {
          const aId = Number(a.answerId);
          const studentId = Number(qr.studentAnswerId);

          let cls = '';
          let icon = '◯';
          let label = '';

          if (aId === studentId) {
            if (qr.isCorrect) {
              cls = 'correct';
              icon = '✅';
              label = '<span style="font-size:0.8rem; color:#065f46; font-weight:800; margin-left:8px; background:#d1fae5; padding:2px 10px; border-radius:99px;">Chính xác</span>';
            } else {
              cls = 'wrong';
              icon = '❌';
              label = '<span style="font-size:0.8rem; color:#991b1b; font-weight:800; margin-left:8px; background:#fee2e2; padding:2px 10px; border-radius:99px;">Bạn đã chọn sai</span>';
            }
          }

          return '<div class="answer-option ' + cls + '" style="cursor:default; pointer-events:none;">' +
                  '<span style="font-size:1.1rem;">' + icon + '</span>' +
                  '<span>' + a.answerText + '</span>' +
                  label +
                  '</div>';
        }).join('');

        return `<div class="question-card" style="border-color:${qr.isCorrect ? '#10b981' : '#ef4444'}; background: ${qr.isCorrect ? '#f0fdf4' : '#fff5f5'};">
                    <div class="question-num">Câu ${i+1} ${qr.isCorrect ? '✅' : '❌'}</div>
                    <div class="question-text">${qr.questionText}</div>
                    ${aList}
                </div>`;
      }).join('');

      document.getElementById('resultArea').style.display = 'block';

      // Kiểm tra có vừa được cấp chứng chỉ không
      const certIssued = result.certificateIssued === true && result.certificateId;
      const certId = result.certificateId;

      let actionsHtml;
      if (passed && certIssued) {
        // 🎓 Học xong toàn bộ khoá học → chuyển đến trang certificate
        actionsHtml = `
          <a href="/certificates/${certId}"
             class="btn btn-success"
             style="border-radius:12px; font-weight:700; padding:14px 32px;
                    background: linear-gradient(135deg,#10b981,#059669);
                    box-shadow:0 6px 20px rgba(16,185,129,0.45); font-size:1.05rem;">
            <i class="bi bi-award-fill me-2"></i>Xem Chứng Chỉ Hoàn Thành
          </a>`;
      } else if (passed) {
        actionsHtml = `
          <a href="/learn/${COURSE_ID}" class="btn btn-success"
             style="border-radius:12px; font-weight:700; padding:12px 28px;
                    box-shadow:0 4px 15px rgba(16,185,129,0.3);">
            <i class="bi bi-arrow-left me-1"></i>Quay lại học tiếp
          </a>`;
      } else {
        actionsHtml = `
          <button class="btn btn-warning text-white" onclick="location.reload()"
                  style="border-radius:12px; font-weight:700; padding:12px 28px;
                         box-shadow:0 4px 15px rgba(245,158,11,0.3);">
            <i class="bi bi-arrow-clockwise me-1"></i>Làm lại bài
          </button>
          <a href="/learn/${COURSE_ID}" class="btn btn-outline-secondary"
             style="border-radius:12px; font-weight:700; padding:12px 28px;">
            Quay lại
          </a>`;
      }

      document.getElementById('resultArea').innerHTML = `
        <div class="result-card">
          <div class="result-score ${passed ? 'pass' : 'fail'}">${score}%</div>
          <div class="result-label">${result.correctCount} / ${result.totalQuestions} câu đúng</div>
          <div class="result-badge ${passed ? 'badge-pass' : 'badge-fail'}">
            ${certIssued
              ? '🎓 Xuất sắc! Bạn đã hoàn thành toàn bộ khoá học!'
              : (passed ? '🎉 Chúc mừng! Bạn đã vượt qua!' : '😔 Chưa đạt — Cần ≥80% để qua bài')}
          </div>
          <div class="result-actions">
            ${actionsHtml}
          </div>
        </div>
        <div class="detail-title">Chi tiết từng câu:</div>
        ${detailHtml}`;

      // Không tự redirect → để người dùng tự quyết định có muốn xem chứng chỉ hay không
    }
  </script>
</div>
</body>
</html>
