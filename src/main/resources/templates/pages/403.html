<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"
>
<head>
    <title th:text="${pageTitle} ?: '403 - Từ chối truy cập'"></title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .error-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #a435f0 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-home {
            background-color: #a435f0;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            padding: 12px 24px;
            transition: all 0.2s ease-in-out;
        }
        .btn-home:hover {
            background-color: #8710d8;
            color: white;
        }
        .btn-back {
            border: 1px solid #1c1d1f;
            border-radius: 4px;
            color: #1c1d1f;
            font-weight: 700;
            padding: 12px 24px;
            background: transparent;
            transition: all 0.2s ease-in-out;
        }
        .btn-back:hover {
            background-color: #f7f9fa;
            color: #1c1d1f;
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 70vh;">
        <div class="error-container text-center px-4">
            <div class="mb-3">
                <i class="bi bi-shield-slash-fill text-danger" style="font-size: 5rem;"></i>
            </div>
            <div class="error-code mb-4">403</div>
            <h2 class="fw-bold text-dark mb-3">Truy cập bị từ chối</h2>
            <p class="text-muted fs-5 mb-5">
                Rất tiếc! Bạn không có quyền truy cập vào tài nguyên hoặc trang này. 
                Nếu bạn cho rằng đây là một sự nhầm lẫn, vui lòng liên hệ với bộ phận hỗ trợ.
            </p>
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                <a href="/home" class="btn btn-home shadow-sm d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-house-door-fill"></i>
                    Quay lại Trang chủ
                </a>
                <button onclick="history.back()" class="btn btn-back d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-arrow-left"></i>
                    Quay lại trang trước
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
