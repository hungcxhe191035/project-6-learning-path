<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"
>

<head>
    <title>Quên mật khẩu</title>
    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>

<body>

<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center align-items-center">
            <div class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-5">
                        <!-- Title -->
                        <div class="text-center mb-4">

                            <div class="mb-3">
                                <i class="bi bi-shield-lock-fill fs-1 text-dark"></i>
                            </div>
                            <h2 class="fw-bold mb-2">
                                Quên mật khẩu
                            </h2>
                            <p class="text-muted mb-0">
                                Nhập email của bạn để nhận liên kết đặt lại mật khẩu
                            </p>
                        </div>
                        <!-- Success Message -->
                        <div
                                th:if="${successMessage}"
                                class="text-success small fw-semibold mb-3"
                        >
                            <i class="bi bi-check-circle-fill me-1"></i>
                            <span th:text="${successMessage}">Đã gửi email đặt lại mật khẩu</span>
                        </div>
                        <!-- Error Message -->
                        <div
                                th:if="${errorMessage}"
                                class="text-danger small fw-semibold mb-3"
                        >
                            <i class="bi bi-exclamation-circle-fill me-1"></i>
                            <span th:text="${errorMessage}">Email không tồn tại</span>
                        </div>
                        <!-- Forgot Password Form -->
                        <form
                                th:action="@{/forgot-password}"
                                method="post"
                        >
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Email
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-envelope-fill"></i>
                                    </span>
                                    <input
                                            type="email"
                                            name="email"
                                            class="form-control"
                                            placeholder="Nhập email của bạn"
                                            required
                                    >
                                </div>
                            </div>
                            <!-- Submit Button -->
                            <button
                                    type="submit"
                                    class="btn btn-dark w-100 py-2 rounded-3 fw-semibold"
                            >
                                Gửi liên kết đặt lại mật khẩu
                            </button>
                        </form>
                        <!-- Back To Login -->
                        <div class="text-center mt-4">
                            <a
                                    th:href="@{/login}"
                                    class="text-decoration-none fw-semibold"
                            >
                                <i class="bi bi-arrow-left me-1"></i>
                                Quay lại đăng nhập
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
