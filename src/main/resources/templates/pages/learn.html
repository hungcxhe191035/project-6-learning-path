<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<head>
    <title th:text="${course.title} + ' - Học ngay'">Học ngay</title>
    <style>
        /* ===== LAYOUT ===== */
        .learn-wrapper {
            display: flex;
            height: calc(100vh - 64px);
            overflow: hidden;
            background: #0f0c29;
        }

        /* ===== SIDEBAR DANH SÁCH BÀI HỌC ===== */
        .learn-sidebar {
            width: 320px;
            min-width: 280px;
            background: #1a1833;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-header {
            padding: 16px 20px;
            background: rgba(124,58,237,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-course-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .sidebar-progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 8px;
        }
        .sidebar-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            border-radius: 99px;
            width: 0%;
            transition: width 0.5s ease;
        }
        .sidebar-sections {
            overflow-y: auto;
            flex: 1;
        }
        .sidebar-sections::-webkit-scrollbar { width: 4px; }
        .sidebar-sections::-webkit-scrollbar-track { background: transparent; }
        .sidebar-sections::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 99px; }

        /* Section group */
        .section-group-header {
            padding: 12px 20px 8px;
            font-size: 0.78rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 4px;
        }

        /* Lesson item */
        .lesson-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }
        .lesson-item:hover { background: rgba(255,255,255,0.05); }
        .lesson-item.active {
            background: rgba(124,58,237,0.2);
            border-left-color: #7c3aed;
        }
        .lesson-item-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }
        .lesson-item.active .lesson-item-icon {
            background: #7c3aed;
            color: white;
        }
        .lesson-item-info { flex: 1; min-width: 0; }
        .lesson-item-title {
            font-size: 0.83rem;
            color: rgba(255,255,255,0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lesson-item.active .lesson-item-title { color: white; font-weight: 600; }
        .lesson-item-duration {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        /* ===== VIDEO PLAYER AREA ===== */
        .learn-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #111;
        }
        .video-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            min-height: 0;
        }
        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 40px;
        }
        .video-placeholder i { font-size: 5rem; color: rgba(124,58,237,0.6); }
        .video-placeholder h3 { font-size: 1.2rem; color: white; font-weight: 700; }
        .video-placeholder p { font-size: 0.9rem; max-width: 400px; line-height: 1.6; }

        /* Lesson info bar */
        .lesson-info-bar {
            background: #1a1833;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .lesson-current-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
        }
        .lesson-nav-btns {
            display: flex;
            gap: 8px;
        }
        .btn-lesson-nav {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-lesson-nav:hover { background: rgba(124,58,237,0.4); border-color: #7c3aed; }
        .btn-lesson-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .learn-wrapper { flex-direction: column; height: auto; }
            .learn-sidebar { width: 100%; height: 260px; min-width: unset; }
        }
    </style>
</head>

<body>
<div layout:fragment="content" class="flex-grow-1 d-flex flex-column" style="height: calc(100vh - 64px); overflow: hidden;">

    <div class="learn-wrapper">

        <!-- ===== SIDEBAR BÀI HỌC ===== -->
        <div class="learn-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-course-title" th:text="${course.title}">Tên khoá học</div>
                <div style="font-size:0.75rem; color:rgba(255,255,255,0.45); margin-top:4px;">
                    <span id="completedCount">0</span>/<span th:id="totalLessons"
                        th:text="${#lists.size(course.sections) > 0 ? course.sections.stream().mapToInt(s -> #lists.size(s.lessons)).sum() : 0}">0</span> bài học
                </div>
                <div class="sidebar-progress-bar">
                    <div class="sidebar-progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="sidebar-sections">
                <th:block th:each="section, sIdx : ${course.sections}">
                    <div class="section-group-header"
                         th:text="${sIdx.index + 1} + '. ' + ${section.title}">Phần 1</div>

                    <div th:each="lesson, lIdx : ${section.lessons}"
                         class="lesson-item"
                         th:classappend="${sIdx.index == 0 and lIdx.index == 0} ? ' active' : ''"
                         th:data-lesson-id="${lesson.lessonId}"
                         th:data-lesson-title="${lesson.title}"
                         th:data-lesson-type="${lesson.lessonType}"
                         th:data-duration="${lesson.durationSeconds}"
                         onclick="selectLesson(this)">
                        <div class="lesson-item-icon">
                            <i th:class="${lesson.lessonType == 'VIDEO'} ? 'bi bi-play-fill'
                                       : (${lesson.lessonType == 'QUIZ'} ? 'bi bi-patch-question'
                                       : 'bi bi-file-text')"></i>
                        </div>
                        <div class="lesson-item-info">
                            <div class="lesson-item-title" th:text="${lesson.title}">Tên bài</div>
                            <div class="lesson-item-duration"
                                 th:if="${lesson.durationSeconds != null}"
                                 th:text="${lesson.durationSeconds / 60} + ' phút'">5 phút</div>
                        </div>
                    </div>
                </th:block>

                <!-- Nếu khoá học chưa có bài học -->
                <div th:if="${course.sections == null or course.sections.isEmpty()}"
                     style="padding:32px 20px; text-align:center; color:rgba(255,255,255,0.35);">
                    <i class="bi bi-inbox" style="font-size:2rem; display:block; margin-bottom:10px;"></i>
                    Khoá học chưa có bài học
                </div>
            </div>
        </div>

        <!-- ===== KHU VỰC XEM BÀI HỌC ===== -->
        <div class="learn-main">
            <!-- Video / content area -->
            <div class="video-area">
                <div class="video-placeholder" id="lessonContent">
                    <i class="bi bi-play-circle"></i>
                    <h3 id="currentLessonTitle">Chọn bài học để bắt đầu</h3>
                    <p>Chọn một bài học từ danh sách bên trái để bắt đầu học. Bạn có thể học theo thứ tự hoặc bỏ qua đến bài bất kỳ.</p>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:8px;">
                        <span style="background:rgba(124,58,237,0.3); border:1px solid rgba(124,58,237,0.5); border-radius:99px; padding:4px 14px; font-size:0.8rem; color:#c4b5fd;">
                            <i class="bi bi-camera-video me-1"></i> Video bài giảng
                        </span>
                        <span style="background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.4); border-radius:99px; padding:4px 14px; font-size:0.8rem; color:#6ee7b7;">
                            <i class="bi bi-infinity me-1"></i> Truy cập suốt đời
                        </span>
                    </div>
                </div>
            </div>

            <!-- Thanh điều hướng bài học -->
            <div class="lesson-info-bar">
                <div>
                    <div style="font-size:0.75rem; color:rgba(255,255,255,0.45); margin-bottom:2px;">Đang học</div>
                    <div class="lesson-current-title" id="bottomLessonTitle">—</div>
                </div>
                <div class="lesson-nav-btns">
                    <button class="btn-lesson-nav" id="btnPrev" onclick="navigate(-1)" disabled>
                        <i class="bi bi-chevron-left me-1"></i>Bài trước
                    </button>
                    <button class="btn-lesson-nav" id="btnNext" onclick="navigate(1)">
                        Bài tiếp<i class="bi bi-chevron-right ms-1"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>
</body>
</html>

<th:block layout:fragment="scripts">
<script>
    // Lấy tất cả lesson items
    const lessonItems = Array.from(document.querySelectorAll('.lesson-item'));
    let currentIndex = 0;

    // Tự động chọn bài đầu tiên khi tải trang
    if (lessonItems.length > 0) {
        selectLesson(lessonItems[0]);
    }

    function selectLesson(el) {
        // Xóa active cũ
        lessonItems.forEach(item => item.classList.remove('active'));
        el.classList.add('active');

        // Cập nhật index
        currentIndex = lessonItems.indexOf(el);

        // Lấy thông tin bài học
        const title = el.dataset.lessonTitle || 'Bài học';
        const type  = el.dataset.lessonType  || 'VIDEO';
        const dur   = el.dataset.duration;

        // Cập nhật tiêu đề
        document.getElementById('currentLessonTitle').textContent = title;
        document.getElementById('bottomLessonTitle').textContent  = title;

        // Cập nhật nội dung hiển thị
        const icon = type === 'QUIZ' ? 'bi-patch-question'
                   : type === 'ARTICLE' ? 'bi-file-text'
                   : 'bi-play-circle';
        const typeLabel = type === 'QUIZ' ? 'Bài kiểm tra'
                        : type === 'ARTICLE' ? 'Bài đọc'
                        : 'Video bài giảng';
        const durText = dur ? Math.floor(dur/60) + ' phút' : '';

        document.getElementById('lessonContent').innerHTML = `
            <i class="bi ${icon}" style="font-size:4rem; color:rgba(124,58,237,0.7);"></i>
            <h3 style="font-size:1.3rem; color:white; font-weight:700; margin:0;">${title}</h3>
            <p style="color:rgba(255,255,255,0.5); font-size:0.9rem;">
                ${typeLabel} ${durText ? '• ' + durText : ''}
            </p>
            <div style="margin-top:16px; padding:20px 24px; background:rgba(124,58,237,0.15);
                        border:1px solid rgba(124,58,237,0.3); border-radius:12px; max-width:480px; text-align:left;">
                <div style="color:rgba(255,255,255,0.7); font-size:0.88rem; line-height:1.7;">
                    <i class="bi bi-info-circle text-purple me-2" style="color:#a78bfa;"></i>
                    Nội dung video bài giảng đang được tải lên. Vui lòng quay lại sau hoặc liên hệ giảng viên.
                </div>
            </div>
        `;

        // Nút điều hướng
        document.getElementById('btnPrev').disabled = (currentIndex === 0);
        document.getElementById('btnNext').disabled = (currentIndex === lessonItems.length - 1);

        // Cuộn sidebar để item active hiển thị
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function navigate(dir) {
        const newIndex = currentIndex + dir;
        if (newIndex >= 0 && newIndex < lessonItems.length) {
            selectLesson(lessonItems[newIndex]);
        }
    }
</script>
</th:block>
