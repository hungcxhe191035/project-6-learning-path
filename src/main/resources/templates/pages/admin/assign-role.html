<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin-layout}"
>
<head>
    <title th:text="${pageTitle}">Gán Vai Trò</title>
    <style>
        .udemy-input-group {
            margin-bottom: 20px;
        }
        .udemy-label {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
            color: #1c1d1f;
        }
        .udemy-form-control {
            padding: 12px 16px;
            font-weight: 500;
            border: 1px solid #1c1d1f;
            border-radius: 0;
            color: #1c1d1f;
            background-color: #fff;
        }
        .udemy-form-control:focus {
            box-shadow: none;
            border-color: #1c1d1f;
            outline: 2px solid #a435f0; /* Purple border focus */
        }
        .udemy-form-control:disabled, .udemy-form-control[readonly] {
            background-color: #f7f9fa;
            border-color: #d1d7dc;
            color: #6a6f73;
            cursor: not-allowed;
        }
        .btn-udemy-submit {
            background-color: #a435f0;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 0;
            padding: 16px;
            font-size: 15px;
            transition: all 0.2s;
        }
        .btn-udemy-submit:hover {
            background-color: #8710d8;
            color: white;
        }
        .btn-udemy-cancel {
            border: 1px solid #1c1d1f;
            background: white;
            color: #1c1d1f;
            font-weight: 700;
            border-radius: 0;
            padding: 16px;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-udemy-cancel:hover {
            background: #f7f9fa;
            color: #1c1d1f;
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/users}" class="text-decoration-none text-secondary fw-semibold">Quản lý Người dùng</a></li>
            <li class="breadcrumb-item active fw-bold text-dark" aria-current="page">Gán vai trò</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-xl-6 col-lg-8">
            <!-- Form Card -->
            <div class="card admin-card">
                <div class="admin-card-header">
                    Thay đổi vai trò thành viên
                </div>
                <div class="card-body p-4">
                    <!-- Error Alert -->
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-0 mb-4" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}">Lỗi xảy ra!</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/admin/users/{id}/assign-role(id=${userId})}" method="post" th:object="${roleForm}">
                        
                        <!-- Full Name (Readonly) -->
                        <div class="udemy-input-group">
                            <label class="udemy-label">Họ và tên</label>
                            <input
                                    type="text"
                                    th:value="${userFullName}"
                                    class="form-control udemy-form-control"
                                    readonly
                            >
                        </div>

                        <!-- Email (Readonly) -->
                        <div class="udemy-input-group">
                            <label class="udemy-label">Địa chỉ Email</label>
                            <input
                                    type="email"
                                    th:value="${userEmail}"
                                    class="form-control udemy-form-control"
                                    readonly
                            >
                        </div>

                        <!-- Role Dropdown -->
                        <div class="udemy-input-group">
                            <label for="role" class="udemy-label">Vai trò thành viên <span class="text-danger">*</span></label>
                            <select id="role" th:field="*{role}" class="form-select udemy-form-control" required>
                                <option
                                        th:each="r : ${roles}"
                                        th:value="${r.name()}"
                                        th:text="${r.name() == 'STUDENT' ? 'Học viên' : (r.name() == 'INSTRUCTOR' ? 'Giảng viên' : 'Quản trị viên')}"
                                >
                                </option>
                            </select>
                            <div th:if="${#fields.hasErrors('role')}" class="invalid-feedback d-block" th:errors="*{role}"></div>
                        </div>

                        <hr class="my-4" style="border-color: #d1d7dc;">

                        <!-- Actions -->
                        <div class="d-flex justify-content-end gap-3">
                            <a th:href="@{/admin/users}" class="btn-udemy-cancel col-md-3">
                                Hủy bỏ
                            </a>
                            <button type="submit" class="btn-udemy-submit col-md-4">
                                Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
