<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin-layout}"
>
<head>
    <title>Quản lý Tag</title>

</head>
<body>
<div layout:fragment="content">

    <!-- Toasts -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-0 toast-alert" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-0 toast-alert" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1" style="color: #0f172a;">Quản lý Tag</h2>
        </div>
    </div>

    <div class="row g-4">
        <!-- LEFT: Form tạo / sửa tag -->
        <div class="col-lg-4">
            <!-- Edit mode banner -->
            <div th:if="${editTag != null}" class="edit-mode-banner mb-3">
                <i class="bi bi-pencil-square me-2"></i>
                Đang sửa tag: <strong th:text="${editTag.tagName}">tag</strong>
                <a th:href="@{/admin/tags}" class="ms-2 text-decoration-none text-danger fw-bold">
                    <i class="bi bi-x-circle"></i> Huỷ
                </a>
            </div>

            <div class="form-card">
                <div class="form-card-header">
                    <span th:if="${editTag == null}"><i class="bi bi-plus-circle-fill me-2"></i>Thêm Tag mới</span>
                    <span th:if="${editTag != null}"><i class="bi bi-pencil-fill me-2"></i>Sửa Tag</span>
                </div>
                <div class="p-4">
                    <!-- Create Form -->
                    <form th:if="${editTag == null}"
                          th:action="@{/admin/tags/create(page=${currentPage}, size=${tagPage.size})}" method="post"
                          th:object="${tagForm}">

                        <div class="mb-3">
                            <label for="tagName" class="form-label fw-bold" style="font-size: 13px;">
                                Tên Tag <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="tagName" th:field="*{tagName}"
                                   class="form-control field-input"
                                   placeholder="Ví dụ: Java, Python, Marketing..."
                                   maxlength="255" autofocus>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('tagName')}" th:errors="*{tagName}"></div>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold" style="font-size: 13px;">Mô tả</label>
                            <textarea id="description" th:field="*{description}" rows="3"
                                      class="form-control field-input"
                                      placeholder="Mô tả ngắn về lĩnh vực này..."
                                      maxlength="1000"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-create">
                                <i class="bi bi-plus-circle-fill me-2"></i>Thêm Tag
                            </button>
                        </div>
                    </form>

                    <!-- Edit Form -->
                    <form th:if="${editTag != null}"
                          th:action="@{/admin/tags/{id}/edit(id=${editTag.tagId}, page=${currentPage}, size=${tagPage.size})}" method="post"
                          th:object="${tagForm}">

                        <div class="mb-3">
                            <label for="editTagName" class="form-label fw-bold" style="font-size: 13px;">
                                Tên Tag <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="editTagName" th:field="*{tagName}"
                                   class="form-control field-input" maxlength="255" autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="editDescription" class="form-label fw-bold" style="font-size: 13px;">Mô tả</label>
                            <textarea id="editDescription" th:field="*{description}" rows="3"
                                      class="form-control field-input" maxlength="1000"></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-create">
                                <i class="bi bi-check-lg me-2"></i>Lưu thay đổi
                            </button>
                             <a th:href="@{/admin/tags}" class="btn-admin-secondary">Huỷ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- RIGHT: Danh sách tags -->
        <div class="col-lg-8">
            <div class="card admin-card">
                <div class="admin-card-header d-flex justify-content-between align-items-center">
                    <span>Danh sách Tag (<span th:text="${totalTags}">0</span> tag)</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" style="font-size: 14px;">
                        <thead class="table-light">
                        <tr>
                            <th class="py-3 ps-4" style="width: 50px;">#</th>
                            <th class="py-3">Tên Tag</th>
                            <th class="py-3">Mô tả</th>
                            <th class="py-3">Ngày tạo</th>
                            <th class="py-3 pe-4 text-end" style="width: 140px;">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="tag, stat : ${tags}"
                            th:classappend="${editTag != null and editTag.tagId == tag.tagId} ? 'table-warning'">
                            <td class="ps-4 text-muted" th:text="${stat.index + 1 + currentPage * tagPage.size}">1</td>
                            <td>
                                <span class="tag-pill">
                                    <i class="bi bi-tag-fill" style="font-size: 11px;"></i>
                                    <span th:text="${tag.tagName}">Tag</span>
                                </span>
                            </td>
                            <td class="text-muted" style="max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                                th:text="${tag.description ?: '—'}"
                                th:title="${tag.description}">--</td>
                            <td class="text-muted"
                                th:text="${tag.createdAt != null ? #temporals.format(tag.createdAt, 'dd/MM/yyyy') : '-'}">--</td>
                            <td class="pe-4 text-end">
                                <div class="d-flex justify-content-end gap-1">
                                    <a th:href="@{/admin/tags/{id}/edit(id=${tag.tagId}, page=${currentPage}, size=${tagPage.size})}"
                                       class="btn btn-edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/tags/{id}/delete(id=${tag.tagId}, page=${currentPage})}" method="post">
                                        <button type="button" class="btn btn-del" th:data-tag-name="${tag.tagName}" onclick="confirmDeleteTag(this)">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${tags.isEmpty()}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-tags fs-1 d-block mb-3"></i>
                                Chưa có tag nào. Hãy thêm tag đầu tiên!
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Card Footer for Pagination -->
                <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center py-3 px-4" th:if="${totalPages > 1}">
                    <div class="text-muted" style="font-size: 13px;">
                        Hiển thị trang <span class="fw-bold" th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span> (Tổng <span th:text="${totalTags}">0</span> kết quả)
                    </div>
                    <nav aria-label="Page navigation">
                        <ul class="pagination pagination-sm mb-0">
                            <!-- First Page -->
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/tags(page=0, size=${tagPage.size})}">
                                    <i class="bi bi-chevron-double-left"></i>
                                </a>
                            </li>
                            <!-- Previous Page -->
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/tags(page=${currentPage - 1}, size=${tagPage.size})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <!-- Page Numbers -->
                            <li class="page-item" 
                                th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                                th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                                th:classappend="${currentPage == i} ? 'active'">
                                <a class="page-link" 
                                   th:href="@{/admin/tags(page=${i}, size=${tagPage.size})}" 
                                   th:text="${i + 1}">1</a>
                            </li>
                            <!-- Next Page -->
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/tags(page=${currentPage + 1}, size=${tagPage.size})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                            <!-- Last Page -->
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/tags(page=${totalPages - 1}, size=${tagPage.size})}">
                                    <i class="bi bi-chevron-double-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toasts = document.querySelectorAll('.toast-alert');
            toasts.forEach(t => {
                setTimeout(() => {
                    t.style.opacity = '0'; t.style.transform = 'translateY(-20px)';
                    setTimeout(() => t.remove(), 300);
                }, 4000);
            });
        });

        function confirmDeleteTag(button) {
            const tagName = button.getAttribute('data-tag-name');
            const form = button.closest('form');
            showConfirm(`Xóa tag '${tagName}'? Hành động này không thể hoàn tác.`, function() {
                form.submit();
            }, 'Xóa tag', true, 'Xóa tag');
        }
    </script>
</div>
</body>
</html>
