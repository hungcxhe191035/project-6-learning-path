<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">

<head>
    <style>

        /* ===== HERO ===== */
        /* Thêm vào trong thẻ <style> */

        .hero-section {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 55%, #4c1d95 100%);
            padding: 56px 0 52px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            width: 480px; height: 480px; border-radius: 50%;
            background: rgba(255,255,255,0.04);
            top: -180px; right: -120px;
        }
        .hero-section::after {
            content: '';
            position: absolute;
            width: 280px; height: 280px; border-radius: 50%;
            background: rgba(255,255,255,0.03);
            bottom: -80px; left: 40%;
        }
        .hero-logo-small {
            height: 40px; width: auto;
            margin-bottom: 20px;
            filter: brightness(0) invert(1);
        }
        .hero-greeting {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .hero-sub {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.7);
            margin: 0;
        }
        /* Logo mờ bên phải */
        .hero-logo-bg {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            height: 220px;
            width: auto;
            /* Trắng + rất mờ */
            filter: brightness(0) invert(1);
            opacity: 0.08;
            pointer-events: none;
            user-select: none;
        }

        /* ===== COURSES SECTION ===== */
        .courses-section {
            padding: 52px 0 60px;
            background: white;
        }

        /* Course card */
        .course-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            height: 100%;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(76,29,149,0.13);
            border-color: #c4b5fd;
        }
        .thumb-wrap { overflow: hidden; }
        .course-thumbnail {
            width: 100%; height: 172px;
            object-fit: cover; display: block;
            transition: transform 0.35s ease;
        }
        .course-card:hover .course-thumbnail { transform: scale(1.05); }
        .course-thumbnail-placeholder {
            width: 100%; height: 172px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center;
            justify-content: center; color: white; font-size: 2.8rem;
        }
        .course-body { padding: 14px 15px 16px; }
        .course-title {
            font-size: 0.92rem; font-weight: 700; color: #111827;
            line-height: 1.45; margin-bottom: 5px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .course-instructor { font-size: 0.78rem; color: #6b7280; margin-bottom: 8px; }
        .star-row { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
        .star-score { font-size: 0.83rem; font-weight: 700; color: #b45309; }
        .stars { color: #f59e0b; font-size: 0.78rem; }
        .star-count { font-size: 0.72rem; color: #9ca3af; }
        .price-row { display: flex; align-items: center; justify-content: space-between; }
        .course-price { font-size: 1rem; font-weight: 800; color: #111827; }
        .badge-hot {
            background: #fef9c3; color: #854d0e;
            border: 1px solid #fde047;
            border-radius: 4px; font-size: 0.68rem;
            font-weight: 700; padding: 2px 7px;
        }
    </style>
</head>

<body>
<main layout:fragment="content">

    <!-- ===== HERO ===== -->
    <!-- ===== HERO ===== -->
    <section class="hero-section">
        <div class="container position-relative" style="z-index:2">
            <div class="row align-items-center">

                <!-- BÊN TRÁI: nội dung -->
                <div class="col-lg-7">
                    <!-- Logo nhỏ trên cùng -->
                    <img th:src="@{/image/logo.png}"
                         alt="My Learning Path"
                         class="hero-logo-small">

                    <!-- Tiêu đề lớn -->
                    <h1 class="hero-greeting">Chào mừng bạn trở lại! 👋</h1>
                    <p class="hero-sub">Tiếp tục hành trình học tập của bạn hôm nay.</p>
                </div>

            </div>
        </div>

        <!-- BÊN PHẢI: logo to mờ, đặt absolute -->
        <img th:src="@{/image/logo.png}"
             alt=""
             class="hero-logo-bg">

    </section>

    <!-- ===== KHOÁ HỌC ===== -->
    <section class="courses-section">
        <div class="container">
            <h2 class="section-title">Lĩnh vực sẽ học tiếp theo</h2>
            <p class="section-sub">Được đề xuất cho bạn</p>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3">
                <div class="col" th:each="course : ${courses}">
                    <a th:href="@{/course/{id}(id=${course.courseId})}"
                       style="text-decoration:none; display:block; height:100%;">
                        <div class="course-card">

                            <div class="thumb-wrap">
                                <img th:if="${course.thumbnailUrl != null}"
                                     th:src="${course.thumbnailUrl}"
                                     th:alt="${course.title}"
                                     class="course-thumbnail">
                                <div th:unless="${course.thumbnailUrl != null}"
                                     class="course-thumbnail-placeholder">
                                    <i class="bi bi-play-circle-fill"></i>
                                </div>
                            </div>

                            <div class="course-body">
                                <div class="course-title" th:text="${course.title}">Tên khoá học</div>
                                <div class="course-instructor" th:text="${course.instructorName}">Giảng viên</div>

                                <div class="star-row">
                                    <span class="star-score"
                                          th:text="${#numbers.formatDecimal(course.averageRating,1,1)}">4.8</span>
                                    <span class="stars">
                                        <th:block th:with="r=${course.averageRating.intValue()}">
                                            <i th:each="i : ${#numbers.sequence(1,5)}"
                                               th:class="${i<=r}?'bi bi-star-fill':'bi bi-star'"></i>
                                        </th:block>
                                    </span>
                                    <span class="star-count"
                                          th:text="'('+${#numbers.formatInteger(course.totalReviews,1,'COMMA')}+')'">
                                        (1,250)
                                    </span>
                                </div>

                                <div class="price-row">
                                    <span class="course-price"
                                          th:text="${#numbers.formatInteger(course.price,1,'COMMA')}+' ₫'">
                                        259.000 ₫
                                    </span>
                                    <span class="badge-hot">Bán chạy</span>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

        </div>
    </section>

</main>
</body>
</html>
