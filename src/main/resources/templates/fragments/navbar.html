<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
>
<body>
    <nav
        th:fragment="navbar"
        class="navbar navbar-expand-lg bg-white border-bottom py-2"
    >
        <div class="container-fluid px-4">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                <img th:src="@{/image/logo.png}" alt="My Learning Path Logo" style="height: 50px; width: auto;" >
            </a>
            <!-- Search -->
            <div class="d-none d-md-flex flex-grow-1 mx-4">
                <div class="search-box d-flex align-items-center w-100">
                    <i class="bi bi-search me-2"></i>
                    <input
                        type="text"
                        class="search-input"
                        placeholder="Tìm kiếm nội dung bất kỳ"
                    >
                </div>
            </div>
            <!-- Right -->
            <div class="d-flex align-items-center gap-3">
                <a href="#"
                   class="text-dark text-decoration-none d-none d-xl-block">
                    My learing Business
                </a>
                <a href="#"
                   class="text-dark text-decoration-none d-none d-xl-block">
                    Giảng viên
                </a>
                <button class="btn">
                    <i class="bi bi-cart3 fs-5"></i>
                </button>
                <a
                    th:href="@{/login}"
                    class="btn btn-login"
                >
                    Đăng nhập
                </a>
                <a
                    th:href="@{/register}"
                    class="btn btn-register"
                >
                    Đăng ký
                </a>
            </div>
        </div>
    </nav>
</body>
</html>
