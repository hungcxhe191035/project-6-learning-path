<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'My Learning Path'"></title>
    <!-- Cấu hình CSRF Token cho Javascript --> 
    <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}"/>
    <link
            rel="icon"
            type="image/png"
            th:href="@{/image/logo.png}"
    >
    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >
    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
    <!-- Common CSS -->
<!--    <link-->
<!--            rel="stylesheet"-->
<!--            th:href="@{/css/style.css}"-->
<!--    >-->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <!-- Main Content -->
    <main
        layout:fragment="content"
        class="flex-grow-1"
    >
    </main>
    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        toastr.options = {
            closeButton: true,
            progressBar: true,
            newestOnTop: true,
            positionClass: "toast-top-right",
            preventDuplicates: true,
            timeOut: "3000"
        };
    </script>
    <!-- Slot để các trang con inject JS riêng -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
